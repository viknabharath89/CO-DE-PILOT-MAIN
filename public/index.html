<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Code Studio</title>

<link rel="stylesheet" href="style.css">

<!-- Monaco Editor CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

</head>

<body>

<div class="container">

<!-- LEFT PANEL -->

<div id="leftPanel">

<div class="logo">AI Code Studio</div>

<div class="aiCard">
<h3>Generate Code</h3>
<p>Create starter code using AI.</p>
<a href="https://code-an.onrender.com/" target="_blank">
    <button type="button">CO(DE) PILOT</button>
</a>

</div>

<div class="aiCard">
<h3>Explain Code</h3>
<p>Understand your program easily.</p>
<button class="aiBtn">Explain</button>
</div>

<div class="aiCard">
<h3>Fix Errors</h3>
<p>Automatically debug your code.</p>
<button class="aiBtn">Fix</button>
</div>

<div class="tips">
<h3>Tips</h3>
<p>Write clean and simple code.</p>
</div>

</div>

<!-- RIGHT PANEL -->

<div id="rightPanel">

<div class="header">

<select id="language" onchange="changeLanguage()">

<option value="javascript">JavaScript</option>
<option value="python">Python</option>
<option value="c">C</option>
<option value="cpp">C++</option>
<option value="java">Java</option>
<option value="php">PHP</option>
<option value="ruby">Ruby</option>
<option value="go">Go</option>
<option value="rust">Rust</option>
<option value="kotlin">Kotlin</option>

</select>

<button onclick="runCode()">Run</button>

</div>

<div id="filename">main.js</div>

<!-- MONACO EDITOR -->

<div id="editor"></div>

<div class="ioPanel">

<div class="inputBox">
<h4>Input</h4>
<textarea id="input"></textarea>
</div>

<div class="outputBox">
<h4>Output</h4>
<div id="output"></div>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
