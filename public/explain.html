<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Code Explainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e1a;
    font-family: 'IBM Plex Mono', 'Fira Code', monospace;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .glow {
    position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; pointer-events: none; z-index: 0;
    background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
  }

  /* Header */
  .header { margin-bottom: 32px; }
  .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, #10b981, #059669);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; box-shadow: 0 0 20px rgba(16,185,129,0.4);
    flex-shrink: 0;
  }
  h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #10b981, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .subtitle { color: #64748b; font-size: 13px; padding-left: 48px; }

  /* Editor */
  .editor-wrap {
    background: #0f1629; border: 1px solid #1e2d45;
    border-radius: 12px; overflow: hidden;
    margin-bottom: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .editor-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: #0c1220; border-bottom: 1px solid #1e2d45;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .editor-label { font-size: 11px; color: #475569; letter-spacing: 0.5px; }
  textarea {
    width: 100%; min-height: 140px; background: transparent;
    border: none; outline: none; padding: 16px;
    color: #a5f3c0; font-size: 14px; line-height: 1.7;
    resize: vertical; font-family: inherit; caret-color: #10b981;
  }
  textarea::placeholder { color: #1e3a2a; }

  /* Button */
  #explainBtn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #10b981, #059669);
    border: none; border-radius: 10px; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.5px; font-family: inherit;
    box-shadow: 0 0 20px rgba(16,185,129,0.3);
    transition: opacity 0.2s;
  }
  #explainBtn:disabled {
    background: #0f2a1f; border: 1px solid #10b981;
    box-shadow: none; cursor: not-allowed;
  }

  .error-box {
    margin-top: 16px; padding: 12px 16px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; color: #fca5a5; font-size: 13px; display: none;
  }

  /* Results */
  #results { margin-top: 28px; display: none; }

  .lang-badge {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    margin-right: 12px;
  }
  .lines-count { color: #334155; font-size: 12px; }
  .badge-row { margin-bottom: 20px; display: flex; align-items: center; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab-btn {
    padding: 8px 16px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
    background: transparent; color: #475569; border: 1px solid #1e2d45;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: #10b981; color: #fff; border-color: #10b981;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Line cards */
  .line-card {
    background: #0f1629; border: 1px solid #1e2d45;
    border-radius: 10px; overflow: hidden; margin-bottom: 10px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .line-card.visible { opacity: 1; transform: translateY(0); }
  .line-top {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: #0c1220; border-bottom: 1px solid #1e2d45;
  }
  .line-num {
    min-width: 24px; height: 24px; border-radius: 6px;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .line-code { color: #a5f3c0; font-size: 13px; flex: 1; }
  .line-bottom { padding: 10px 14px; }
  .line-explain { color: #94a3b8; font-size: 13px; line-height: 1.6; }

  /* Summary */
  .summary-card {
    background: #0f1629; border: 1px solid #1e2d45;
    border-radius: 12px; padding: 24px;
  }
  .summary-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(16,185,129,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 16px;
  }
  .summary-title {
    color: #10b981; font-size: 14px; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .summary-text { color: #cbd5e1; font-size: 14px; line-height: 1.8; }

  /* Suggestions */
  .tip-card {
    background: #0f1629; border: 1px solid #1e3a2a;
    border-radius: 10px; padding: 14px 16px;
    display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px;
  }
  .tip-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .tip-text { color: #94a3b8; font-size: 13px; line-height: 1.6; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinning { display: inline-block; animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow"></div>

<div class="container">

  <div class="header">
    <div class="header-row">
      <div class="logo">⟨/⟩</div>
      <h1>AI Code Explainer</h1>
    </div>
    <p class="subtitle">Paste any code → get a line-by-line breakdown</p>
  </div>

  <div class="editor-wrap">
    <div class="editor-bar">
      <div class="dots">
        <div class="dot" style="background:#ff5f56"></div>
        <div class="dot" style="background:#ffbd2e"></div>
        <div class="dot" style="background:#27c93f"></div>
      </div>
      <span class="editor-label">main.js</span>
      <span class="editor-label">editor</span>
    </div>
    <textarea id="codeInput" placeholder="// Paste your code here...">console.log("Hello World");</textarea>
  </div>

  <button id="explainBtn" onclick="explainCode()">▶&nbsp; Explain This Code</button>
  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <div class="badge-row">
      <span class="lang-badge" id="langBadge"></span>
      <span class="lines-count" id="linesCount"></span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('lines', this)">Line-by-Line</button>
      <button class="tab-btn" onclick="switchTab('summary', this)">Summary</button>
      <button class="tab-btn" id="tipsTabBtn" onclick="switchTab('suggestions', this)">Tips</button>
    </div>

    <div class="tab-content active" id="tab-lines"></div>
    <div class="tab-content" id="tab-summary"></div>
    <div class="tab-content" id="tab-suggestions"></div>
  </div>

</div>

<script>
    window.onload = function(){

  const code = localStorage.getItem("explainCode");

  if(code){
    document.getElementById("codeInput").value = code;
  }

}
const LANG_COLORS = {
  javascript: "#f7df1e", python: "#3776ab", java: "#ed8b00",
  typescript: "#3178c6", css: "#264de4", html: "#e34f26",
  rust: "#ce412b", go: "#00add8", ruby: "#cc342d"
};
const DEFAULT_COLOR = "#10b981";

function getLangColor(lang = "") {
  return LANG_COLORS[lang.toLowerCase()] || DEFAULT_COLOR;
}

function switchTab(name, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
}

async function explainCode() {
  const code = document.getElementById("codeInput").value.trim();
  if (!code) return;

  const btn = document.getElementById("explainBtn");
  const errorBox = document.getElementById("errorBox");
  const results = document.getElementById("results");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">⟳</span>&nbsp; Analyzing code...';
  errorBox.style.display = "none";
  results.style.display = "none";

  const systemPrompt = `You are an expert programming tutor. When given code:
1. Auto-detect the programming language
2. Explain line by line: show line number, exact code, and a beginner-friendly explanation
3. Explain variables, loops, conditions, and functions clearly
4. After line-by-line, give a short overall summary
5. Suggest improvements or flag potential errors

Respond ONLY in this exact JSON format (no markdown, no backticks):
{
  "language": "JavaScript",
  "lines": [
    { "number": 1, "code": "console.log(\\"Hello World\\");", "explanation": "Prints Hello World to the console." }
  ],
  "summary": "Short description of what the whole program does.",
  "suggestions": ["Tip one.", "Tip two."]
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: "Explain this code:\n\n" + code }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(b => b.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const result = JSON.parse(clean);

    renderResults(result);
  } catch (e) {
    errorBox.textContent = "Something went wrong. Please try again.";
    errorBox.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "▶&nbsp; Explain This Code";
  }
}

function renderResults(result) {
  const color = getLangColor(result.language);

  // Badge
  const badge = document.getElementById("langBadge");
  badge.textContent = result.language;
  badge.style.background = color + "22";
  badge.style.border = "1px solid " + color + "55";
  badge.style.color = color;

  document.getElementById("linesCount").textContent =
    "— " + result.lines.length + " line" + (result.lines.length !== 1 ? "s" : "") + " analyzed";

  // Update tips tab label
  document.getElementById("tipsTabBtn").textContent =
    "Tips (" + (result.suggestions?.length || 0) + ")";

  // Lines tab
  const linesEl = document.getElementById("tab-lines");
  linesEl.innerHTML = "";
  result.lines.forEach((line, i) => {
    const card = document.createElement("div");
    card.className = "line-card";
    card.innerHTML = `
      <div class="line-top">
        <div class="line-num" style="background:${color}22; color:${color}">${line.number}</div>
        <code class="line-code">${escapeHtml(line.code)}</code>
      </div>
      <div class="line-bottom">
        <p class="line-explain">💡 ${escapeHtml(line.explanation)}</p>
      </div>
    `;
    linesEl.appendChild(card);
    setTimeout(() => card.classList.add("visible"), i * 120);
  });

  // Summary tab
  document.getElementById("tab-summary").innerHTML = `
    <div class="summary-card">
      <div class="summary-icon">📋</div>
      <div class="summary-title">What this program does</div>
      <p class="summary-text">${escapeHtml(result.summary)}</p>
    </div>
  `;

  // Suggestions tab
  const icons = ["🚀","⚡","🔧","✅","🎯"];
  document.getElementById("tab-suggestions").innerHTML =
    (result.suggestions || []).map((s, i) => `
      <div class="tip-card">
        <span class="tip-icon">${icons[i] || "💡"}</span>
        <p class="tip-text">${escapeHtml(s)}</p>
      </div>
    `).join("");

  // Reset to first tab
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === 0));
  document.querySelectorAll(".tab-content").forEach((t, i) => t.classList.toggle("active", i === 0));

  document.getElementById("results").style.display = "block";
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
</body>
</html>
